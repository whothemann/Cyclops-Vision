  <section class="slide" data-label="03 The problem">
    <div class="frame">
      <p class="eyebrow">The problem</p>
      <h1 class="title">A drone should know the distance to a target.</h1>
      <div class="distance-stage">
        <svg viewBox="0 0 1700 540" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <marker id="arrL" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
              <path d="M10,0 L0,5 L10,10 z" fill="rgba(255,255,255,0.6)"/>
            </marker>
            <marker id="arrR" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
              <path d="M0,0 L10,5 L0,10 z" fill="rgba(255,255,255,0.6)"/>
            </marker>
            <radialGradient id="eyeGrad" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="oklch(0.85 0.18 60)"/>
              <stop offset="60%" stop-color="oklch(0.55 0.22 320)"/>
              <stop offset="100%" stop-color="oklch(0.30 0.18 290)"/>
            </radialGradient>
          </defs>

          <!-- horizon line, very faint -->
          <line x1="60" y1="430" x2="1640" y2="430" stroke="rgba(255,255,255,0.12)" stroke-width="1" stroke-dasharray="2 8"/>

          <!-- drone (left) — minimal silhouette: body + 4 arms + props -->
          <g transform="translate(220,260)">
            <!-- arms -->
            <line x1="-90" y1="-50" x2="-30" y2="-10" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
            <line x1="90" y1="-50" x2="30" y2="-10" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
            <line x1="-90" y1="50" x2="-30" y2="10" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
            <line x1="90" y1="50" x2="30" y2="10" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
            <!-- body -->
            <rect x="-30" y="-14" width="60" height="28" rx="6" fill="none" stroke="#fff" stroke-width="3"/>
            <!-- camera eye -->
            <circle cx="40" cy="0" r="14" fill="url(#eyeGrad)"/>
            <circle cx="40" cy="0" r="22" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
            <!-- props -->
            <ellipse cx="-90" cy="-50" rx="34" ry="4" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
            <ellipse cx="90" cy="-50" rx="34" ry="4" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
            <ellipse cx="-90" cy="50" rx="34" ry="4" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
            <ellipse cx="90" cy="50" rx="34" ry="4" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
          </g>

          <!-- vision cone -->
          <path d="M 260 260 L 1380 140 L 1380 380 Z" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.18)" stroke-width="1" stroke-dasharray="3 6"/>

          <!-- target (right) — abstract shape -->
          <g transform="translate(1430,260)">
            <rect x="-10" y="-110" width="20" height="220" fill="none" stroke="#fff" stroke-width="2.5"/>
            <rect x="-50" y="-70" width="100" height="60" fill="none" stroke="#fff" stroke-width="2.5"/>
            <rect x="-40" y="20" width="80" height="80" fill="none" stroke="#fff" stroke-width="2.5"/>
            <line x1="-50" y1="100" x2="50" y2="100" stroke="#fff" stroke-width="3"/>
          </g>

          <!-- distance line + arrows -->
          <line x1="320" y1="260" x2="1380" y2="260" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"
                marker-start="url(#arrL)" marker-end="url(#arrR)"/>

          <!-- distance ticks -->
          <g stroke="rgba(255,255,255,0.3)" stroke-width="1">
            <line x1="500" y1="252" x2="500" y2="268"/>
            <line x1="680" y1="252" x2="680" y2="268"/>
            <line x1="860" y1="252" x2="860" y2="268"/>
            <line x1="1040" y1="252" x2="1040" y2="268"/>
            <line x1="1220" y1="252" x2="1220" y2="268"/>
          </g>

          <!-- d = ? label -->
          <g transform="translate(850,210)">
            <text x="0" y="0" text-anchor="middle" fill="#fff" font-family="JetBrains Mono, ui-monospace, monospace" font-size="36" font-weight="500" letter-spacing="2">d  =  ?</text>
          </g>
        </svg>
      </div>
    </div>
    <span class="slide-num mono">02 / 12</span>
    <div class="logo-corner-eye"><div class="ce-outer"></div><div class="ce-inner"></div><div class="ce-pupil"></div></div>
  </section>
